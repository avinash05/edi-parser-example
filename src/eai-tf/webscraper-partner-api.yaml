components:
  securitySchemes:
    API-Key:
      type: apiKey
      in: header
      name: x-api-key
      description: |
        **API Key Authentication**

        All WebScraper Partner API requests require authentication using an API key provided in the `x-api-key` header.

        **How to obtain an API key:**
        1. Contact our support team at connectivity@dentalxchange.com
        2. Provide your organization details and intended use case
        3. Complete the integration agreement and security review
        4. Receive your unique API key for production or sandbox environments

        **Security Requirements:**
        - Keep your API key secure and never expose it in client-side code
        - Use HTTPS for all API requests to ensure key transmission security
  schemas:
    ConnectionStatus:
      type: string
      description: |
        Current status of the portal connection indicating the authentication and session state.

        **Status Values:**
        - `Queued` - Connection request has been queued for processing
        - `InProgress` - Authentication process is currently in progress
        - `2faRequired` - Multi-factor authentication code is required to complete connection
        - `Connected` - Successfully authenticated and ready for data extraction
        - `Disconnected` - Connection has been terminated or expired
        - `Invalid` - Authentication failed due to invalid credentials
        - `Error` - Connection failed due to technical error or portal issues
      enum:
        - Queued
        - InProgress
        - 2faRequired
        - Connected
        - Disconnected
        - Invalid
        - Error
    Payer:
      type: object
      title: Payer
      description: >
        Represents a dental insurance payer responsible for administering dental benefit plans. 
        Each payer contains details needed for eligibility verification, claims processing, and member benefits.
      properties:
        payerIdCode:
          type: string
          description: Unique Payer's Identifier
        name:
          type: string
          description: Insurance payer name
    AuthenticationType:
      type: string
      description: Indicates which type of authentication currently available for the portal
      enum:
        - Basic
        - Authenticator
        - MFA
    Portal:
      type: object
      description: |
        Represents a dental insurance portal available for integration. Each portal corresponds 
        to a specific payer system with unique authentication requirements and data extraction capabilities.
      properties:
        name:
          type: string
          description: Human-readable name of the insurance portal
        website:
          type: string
          description: Primary website URL for the insurance portal
        payers:
          type: array
          items:
            $ref: "#/components/schemas/Payer"
        authenticationType:
          $ref: "#/components/schemas/AuthenticationType"
    Connection:
      type: object
      description: |
        Represents a secure connection between a dental provider and an insurance portal. 
        Connections store encrypted authentication credentials and maintain session state for 
        accessing portal data on behalf of the provider.
      properties:
        connectionId:
          type: string
          description: Globally unique identifier for this connection instance
        status:
          $ref: "#/components/schemas/ConnectionStatus"
        createdAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the connection was initially created
        updatedAt:
          type: string
          format: date-time
          description: ISO 8601 timestamp when the connection was last modified or status changed
        username:
          type: string
          description: Portal username associated with this connection (encrypted in storage)
        additional:
          type: object
          title: Additional Portal Information
          description: |
            Portal-specific additional information required for authentication or identification.
            Common fields include provider NPI, location codes, or portal-specific identifiers.
          additionalProperties:
            type: string
        portal:
          $ref: "#/components/schemas/Portal"
        payer:
          type: object
          title: Payer
          description: >
            Represents a dental insurance payer responsible for administering dental benefit plans. 
            Each payer contains details needed for eligibility verification, claims processing, and member benefits.
          properties:
            payerIdCode:
              type: string
              description: Unique Payer's Identifier
            name:
              type: string
              description: Insurance payer name
            address:
              $ref: "#/components/schemas/Address"
        error:
          type: object
          description: Error details if the connection is in an error state, including error type and diagnostic message
    ConnectionStatusResponse:
      type: object
      properties:
        transactionId:
          type: string
          description: Unique transaction identifier
        response:
          allOf:
            - type: object
            - title: Response
            - $ref: "#/components/schemas/Connection"
    ResponseError:
      type: object
      properties:
        message:
          type: string
          description: Error message describing the cause of failure.
    ValidationError:
      type: array
      items:
        type: object
        properties:
          path:
            description: Path in the request that has the error.
            type: string
          message:
            description: Error description.
            type: string
          location:
            description: Part of the request that has the error. `body`, `path`, `query`
            type: string
    Error:
      type: object
      title: Error
      properties:
        message:
          type: string
          description: Error message describing the cause of failure.
    BadRequestError:
      type: object
      title: Error
      properties:
        transactionId:
          type: string
          description: Unique transaction identifier
        errorType:
          type: string
          enum:
            - RESPONSE
            - VALIDATION
        error:
          oneOf:
            - $ref: "#/components/schemas/ResponseError"
            - $ref: "#/components/schemas/ValidationError"
    ConnectionUpdateRequest:
      type: object
      properties:
        password:
          type: string
          description: Password for the portal
          minLength: 1
        mfaSecretKey:
          type: string
          nullable: true
          description: Secret key used for setting up Multi Factor Authentication (MFA).
        additional:
          type: object
          title: Additional
          description: Additional information
          nullable: true
          additionalProperties:
            type: string
      required:
        - password
    ConnectionResponse:
      type: object
      properties:
        transactionId:
          type: string
          description: Unique transaction identifier
        response:
          type: object
          title: Response
          properties:
            connectionId:
              type: string
              description: Unique connection identifier
    ConnectionRequest:
      type: object
      properties:
        locationId:
          type: string
          description: unique location identifier
          minLength: 1
        username:
          type: string
          description: Username for the portal
          minLength: 1
        password:
          type: string
          description: Password for the portal
          minLength: 1
        mfaSecretKey:
          type: string
          nullable: true
          description: Secret key used for setting up Multi Factor Authentication (MFA).
        payer:
          type: object
          title: Payer
          description: Payer's information
          properties:
            payerIdCode:
              type: string
              description: Unique Payer's Identifier
              minLength: 1
            name:
              type: string
              description: Payer's name
              minLength: 1
            address:
              type: object
              description: Payer address
              nullable: true
              $ref: "#/components/schemas/Address"
          required:
            - payerIdCode
        additional:
          type: object
          title: Additional
          description: Additional information
          nullable: true
          additionalProperties:
            type: string
      required:
        - portalId
        - locationId
        - username
        - password
        - payer
    ConnectionsResponse:
      type: object
      properties:
        transactionId:
          type: string
          description: Unique transaction identifier
        response:
          type: array
          title: Response
          items:
            $ref: "#/components/schemas/Connection"
    EligibilityStatus:
      type: string
      description: |
        Current processing status of an eligibility verification request indicating progress through the extraction pipeline.

        **Status Values:**
        - `Queued` - Request has been received and queued for processing
        - `InProgress` - Portal authentication and data extraction is actively in progress  
        - `ScrapeCompleted` - Raw data extraction from portal has completed successfully
        - `Completed` - Data processing and normalization is complete, eligibility data is ready for download
        - `Error` - Processing failed due to authentication, portal, or data extraction issues

        **Typical Flow:** Queued → InProgress → ScrapeCompleted → Completed
      enum:
        - Queued
        - InProgress
        - ScrapeCompleted
        - Completed
        - Error
    EligibilityRelationship:
      type: string
      title: Patient Relationship to Subscriber
      description: |
        Standard X12 relationship codes defining the patient's relationship to the primary insurance subscriber.
        These codes are used by insurance portals to determine coverage rules and benefit calculations.

        **Relationship Codes:**
        - `01` - Spouse of the primary subscriber
        - `18` - Self (patient is the primary subscriber)  
        - `19` - Child of the primary subscriber
        - `34` - Other adult dependent (e.g., domestic partner, adult child)

        **Note:** Use code `18` when the patient is also the insurance policy holder.
      enum:
        - "01"
        - "18"
        - "19"
        - "34"
    Address:
      type: object
      description: Address information of a payer
      properties:
        address1:
          type: string
          description: Address line 1
          nullable: true
        address2:
