openapi: 3.0.0
info:
  description: |
    ## WebScraper Partner API

    The WebScraper Partner API enables secure integration with dental insurance portals for eligibility verification and benefits data extraction. This API provides a comprehensive solution for dental providers to streamline patient insurance verification processes.

    ### Key Features
    - **Portal Integration**: Connect to multiple dental insurance portals using secure credential management
    - **Eligibility Verification**: Verify patient insurance eligibility and benefits
    - **Webhook Events**: Receive instant notifications when eligibility data is ready
    - **Multi-Factor Authentication**: Support for MFA-enabled portal connections
    - **Comprehensive Data**: Extract detailed plan information, benefits, limitations, and service history

    ### API Workflow
    1. **Create Connection** - Establish secure connection to insurance portal with provider credentials
    2. **Subscribe to Events** - Register webhook endpoints to receive instant notifications
    3. **Request Eligibility** - Submit patient information for insurance verification
    4. **Receive Notifications** - Get notified via webhooks when data is available
    5. **Retrieve Data** - Download comprehensive eligibility and benefits information

    ### Webhook Event Examples

    When events occur, your registered webhook endpoints will receive HTTP POST requests with JSON payloads. Below are example payloads for each event type:

    **Connection Events:**
    - `connection.connected`: [$ref](#/components/examples/WebhookEventConnected)
    - `connection.invalid`: [$ref](#/components/examples/WebhookEventInvalid) 
    - `connection.2fa`: [$ref](#/components/examples/WebhookEventConnection2FA)
    - `connection.sqa`: [$ref](#/components/examples/WebhookEventConnectionSQA)
    - `connection.error`: [$ref](#/components/examples/WebhookEventConnectionError)
    - `connection.disconnected`: [$ref](#/components/examples/WebhookEventDisconnected)

    **Eligibility Events:**
    - `eligibility.queued`: [$ref](#/components/examples/WebhookEventEligibilityQueued)
    - `eligibility.error`: [$ref](#/components/examples/WebhookEventEligibilityError) 
    - `eligibility.verified`: [$ref](#/components/examples/WebhookEventEligibilityVerified)

    All webhook payloads conform to the [`WebhookEvent`](#/components/schemas/WebhookEvent) schema.

    ### Authentication
    All API requests require a valid API key provided in the `x-api-key` header. Contact our support team to obtain your API credentials.
  version: 1.1.1
  title: WebScraper Partner API
  contact:
    name: API Support
    email: connectivity@dentalxchange.com
    url: https://www.dentalxchange.com
  license:
    name: DentalXchange
    url: https://www.dentalxchange.com/user-agreement
servers:
  - url: https://staging-api-webscraper.dentalxchange.com
    description: API Endpoint Staging
  - url: https://api-webscraper.dentalxchange.com
    description: API Endpoint Production
security:
  - API-Key: []
tags:
  - name: Connection
    x-displayName: Connection Management
    description: |
      Manage secure connections to dental insurance portals. Connections store encrypted credentials 
      and maintain session state for accessing portal data. Each connection represents a unique 
      provider-portal relationship with specific authentication requirements.
  - name: Portal
    x-displayName: Portal Information
    description: |
      Retrieve information about available dental insurance portals. Each portal represents a 
      different payer system with specific integration capabilities, status information, and 
      technical requirements for data extraction.
  - name: Eligibility
    x-displayName: Eligibility Verification
    description: |
      Submit and manage patient eligibility verification requests. This service validates insurance 
      coverage, extracts benefits information, and provides comprehensive dental plan details 
      including limitations, maximums, and service history.
  - name: Endpoint
    x-displayName: Endpoint Management
    description: |
      Configure and manage webhook endpoints for event notifications. Webhooks provide 
      instant updates on connection status changes, eligibility completion, and error conditions, 
      enabling efficient asynchronous processing workflows.
  - name: Health
    x-displayName: Health
    description: |
      Monitor API system health and dependencies. Health checks provide current status information 
      about service availability, database connectivity, and external system dependencies to ensure 
      optimal API performance.
  - name: PortalModel
    x-displayName: Portal
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Portal"/>
  - name: ConnectionModel
    x-displayName: Connection
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Connection"/>
  - name: EligibilityModel
    x-displayName: Eligibility
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Eligibility"/>
  - name: PlanModel
    x-displayName: Plan
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/Plan"/>
  - name: ConnectionStatus
    x-displayName: Connection Status
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/ConnectionStatus"/>
  - name: EligibilityStatus
    x-displayName: Eligibility Status
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/EligibilityStatus"/>
  - name: PlanStatus
    x-displayName: Plan Status
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/PlanStatus"/>
  - name: ErrorCode
    x-displayName: Error Code
    description: |
      | Code                             | Message                                |
      |----------------------------------|----------------------------------------|
      | BadRequest                       | Request was invalid                    |
      | LoginError                       | Invalid login credentials              |
      | 2FAError                         | Error using MFA code                   |
      | PatientDOBError                  | Patient date of birth was invalid      |
      | PatientNameError                 | Patient name was invalid               |
      | PatientMemberIDError             | Patient member ID was invalid          |
      | PatientMemberGroupNumberError    | Patient member group was invalid       |
      | PatientNotFound                  | Patient not found                      |
      | SubscriberDOBError               | Subscriber date of birth was invalid   |
      | SubscriberNameError              | Subscriber name was invalid            |
      | SubscriberMemberIDError          | Subscriber member ID was invalid       |
      | SubscriberMemberGroupNumberError | Subscriber member group was invalid    |
      | SubscriberNotFound               | Subscriber not found                   |
      | ProviderNPIError                 | Provider NPI was invalid               |
      | ProviderTaxIDError               | Provider Tax ID was invalid            |
      | ProviderNameError                | Provider name was invalid              |
      | ProviderNotFound                 | Provider not found                     |
      | ProviderUnauthorized             | Provider not authorized to access portal |
      | PayerNotSupported                | Payer is not supported                 |
      | PayerError                       | Unknown payer error                    |
      | PayerUnavailable                 | Payer is currently unavailable         |
      | ServiceError                     | A service-level error occurred         |
      | ScreenCaptureError               | Failed to capture screen               |
      | SessionLoadError                 | Unable to load session                 |
      | SessionStoreError                | Unable to store session                |
      | TimeoutError                     | Operation timed out                    |
      | ServerError                      | Internal server error occurred         |
      | NetworkError                     | Network connection error               |
      | ConfigurationError               | Configuration is invalid or missing   |
      | NormalizationError               | Data normalization failed              |
      | ScraperError                     | Scraper failed to complete task        |
      | UnhandledError                   | An unknown/unhandled error occurred    |
      | UserInterventionRequired         | Manual user intervention is required   |
      | DentalPlanNotFoundError          | Dental plan could not be found         |
      | StatusStaledError                | Eligibility status is outdated         |
      | ConnectionError                  | Failed to connect to portal            |
      | PayerInfoError                   | Error retrieving payer information     |
      | PayerReferenceError              | Payer reference is invalid or missing  |
      | CredentialProviderError          | Credential provider encountered error  |
      | SilentAbortError                 | Request was silently aborted           |
  - name: WebhookEvent
    x-displayName: Webhook Events
    description: |
      <SchemaDefinition schemaRef="#/components/schemas/WebhookEvent"/>
paths:
  /integrations/partner/connections:
    post:
      summary: Create Connection
      description: |
        Creates a new connection with the provided details.
        The connection payload should be included in the request body.
      operationId: connections-connect
      tags:
        - Connection
      requestBody:
        description: Contains the connection request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionRequest"
            examples:
              ConnectionRequest:
                $ref: "#/components/examples/ConnectionRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
              examples:
                Response:
                  $ref: "#/components/examples/ConnectionResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    put:
      summary: Update Connection
      description: |
        Updates an existing connection's details(Password).
        The `connectionId` must be provided as a query parameter, and updated fields in the request body.
      operationId: connections-update
      tags:
        - Connection
      parameters:
        - in: query
          name: connectionId
          description: Unique connection identifier
          required: true
          example: ea45db7e-ba43-49fc-a1a0-29d49a66cb8f
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Contains the connection update request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConnectionUpdateRequest"
            examples:
              Request:
                $ref: "#/components/examples/ConnectionUpdateRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionResponse"
              examples:
                Response:
                  $ref: "#/components/examples/ConnectionResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    delete:
      summary: Delete Connection
      description: |
        Delete the details of a specific connection using its unique identifier.
      operationId: connections-remove
      tags:
        - Connection
      parameters:
        - in: query
          name: connectionId
          description: Unique connection identifier
          required: true
          example: ea45db7e-ba43-49fc-a1a0-29d49a66cb8f
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
                    title: Response
                    properties:
                      connectionId:
                        type: string
                        description: Unique identifier for connection
              examples:
                Response:
                  value:
                    transactionId: 23335e12-8e8d-11ee-b9d1-0242ac120002
                    response:
                      connectionId: 0242ac10-8e8d-11ee-b9d1-0242ac1211ee
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    get:
      summary: Get Connection
      description: |
        Retrieves the details of a specific connection using its unique identifier.
      operationId: connections-status
      tags:
        - Connection
      parameters:
        - in: query
          name: connectionId
          description: Unique connection identifier
          required: true
          example: ea45db7e-ba43-49fc-a1a0-29d49a66cb8f
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionStatusResponse"
              examples:
                Response:
                  $ref: "#/components/examples/ConnectionStatusResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/connections/list:
    get:
      summary: List Connections
      description: |
        Get the list of partner connections with their current status and details.
      operationId: connections-list
      tags:
        - Connection
      parameters:
        - in: query
          name: locationId
          description: unique location identifier
          required: true
          example: "-123218"
          schema:
            type: string
            minLength: 1
        - in: query
          name: cursor
          description: cursor token
          example: "eyJHU0kxUEsiOiJjb25uZWN0aW9uI2QxZadf0ZYzI3ZDEyM2QwYjAifQ=="
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConnectionsResponse"
              examples:
                Response:
                  $ref: "#/components/examples/ConnectionsResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/connections/mfa/code/submit:
    put:
      summary: Submit MFA Code
      description: |
        Submit the Multi Factor Authentication (MFA) code as part of the credential login process.
        The verification code is typically sent via Email, SMS, or Phone.
      operationId: connections-mfa
      tags:
        - Connection
      requestBody:
        description: Contains the portal credential request.
        content:
          application/json:
            schema:
              type: object
              properties:
                connectionId:
                  type: string
                  description: Unique connection identifier
                  minLength: 1
                mfaCode:
                  type: string
                  description: Multi-Factor Authentication code
                  minLength: 1
              required:
                - connectionId
                - mfaCode
            example:
              connectionId: "ea45db7e-ba43-49fc-a1a0-29d49a66cb8f"
              mfaCode: "123456"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
                    title: Response
                    properties:
                      connectionId:
                        type: string
                        description: Unique connection identifier
              examples:
                Response:
                  value:
                    transactionId: 23335e12-8e8d-11ee-b9d1-0242ac120002
                    response:
                      connectionId: 0242ac10-8e8d-11ee-b9d1-0242ac1211ee
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/connections/mfa/code/generate:
    post:
      summary: Generate MFA Code
      description: |
        Generates a Multi-Factor Authentication (MFA) code using the mfaSecretKey provided by the user.
      operationId: generate--mfa
      tags:
        - Connection
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                mfaSecretKey:
                  type: string
                  description: Secret key used for setting up Multi Factor Authentication (MFA).
                  minLength: 1
              required:
                - mfaSecretKey
            example:
              mfaSecretKey: "XSQ2MZSOCTUP7NSHSQYHJRQ2XUK3EHSMP"
      responses:
        "200":
          description: Successfully generated the MFA code.
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
                    properties:
                      mfaCode:
                        type: string
                        description: Generated MFA code
                example:
                  transactionId: "23335e12-8e8d-11ee-b9d1-0242ac120002"
                  response:
                    mfaCode: "123456"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/eligibilities:
    post:
      summary: Submit Eligibility Verification
      description: |
        Initiates a comprehensive eligibility verification request for a patient's dental insurance coverage. 
        This endpoint submits patient, subscriber, and provider information to the specified portal for 
        benefits verification.

        **Key Information Extracted:**
        - Insurance plan details and status
        - Coverage maximums and deductibles  
        - Benefits by procedure category (preventive, basic, major, orthodontic)
        - Network participation and co-payment information
        - Service limitations and waiting periods
        - Recent claims history and utilization

        **Process Flow:**
        1. Request is queued for processing
        2. Portal authentication and data extraction begins  
        3. Webhook notification sent when data is ready
        4. Detailed eligibility data becomes available for download

        **Note:** This is an asynchronous operation. Use webhooks or polling to check completion status.
      operationId: eligibilities-request
      tags:
        - Eligibility
      requestBody:
        description: Contains the eligibility request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EligibilityRequest"
            examples:
              EligibilityRequest:
                $ref: "#/components/examples/EligibilityRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
                    title: Response
                    properties:
                      eligibilityId:
                        type: string
                        description: Unique identifier for eligibility
              examples:
                Response:
                  value:
                    transactionId: 23335e12-8e8d-11ee-b9d1-0242ac120002
                    response:
                      eligibilityId: 01K0A9SZM0SQAADZ2J0MMDZBPE
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    put:
      summary: Retry Eligibility
      description: |
        Retries a previously submitted eligibility request to the specified portal.
      operationId: eligibilities-retry
      tags:
        - Eligibility
      parameters:
        - in: query
          name: eligibilityId
          description: Unique identifier for eligibility
          required: true
          example: 01K0A8SZM0SQAADZ2J0MMDZBPE
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
                    title: Response
                    properties:
                      eligibilityId:
                        type: string
                        description: Unique identifier for eligibility
              examples:
                Response:
                  value:
                    transactionId: 23335e12-8e8d-11ee-b9d1-0242ac120002
                    response:
                      eligibilityId: 01K0A8SZM0SQABDZ2J0MMDZBPE
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    get:
      summary: Get Eligibility
      description: Retrieves the details of an existing eligibility request.
      operationId: eligibilities-status
      tags:
        - Eligibility
      parameters:
        - in: query
          name: eligibilityId
          description: Unique identifier for eligibility
          required: true
          example: 01K0A8SZM0SQAADZ2J0MMDZBPE
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EligibilityResponse"
              examples:
                Response:
                  $ref: "#/components/examples/EligibilityResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/portals:
    get:
      summary: Get Portal Status
      description: Retrieves the current status and availability of the specified portal.
      operationId: portals-status
      tags:
        - Portal
      parameters:
        - in: query
          name: payerIdCode
          description: Unique payer identifier
          required: true
          example: 65978
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalResponse"
              examples:
                Response:
                  $ref: "#/components/examples/PortalResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/portals/list:
    get:
      summary: List Portals
      description: Retrieves a list of all available portals with their details.
      operationId: portals-list
      tags:
        - Portal
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortalsResponse"
              examples:
                Response:
                  $ref: "#/components/examples/PortalsResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
  /integrations/partner/webhooks/endpoints:
    post:
      summary: Register Webhook Endpoint
      description: |
        Register a webhook endpoint to receive event notifications for connection status changes 
        and eligibility completion updates. This enables asynchronous processing workflows and immediate 
        response to data availability.

        **Supported Events:**
        - **Connection Events**: `connection.connected`, `connection.invalid`, `connection.2fa`, `connection.sqa`, `connection.error`, `connection.disconnected`
        - **Eligibility Events**: `eligibility.queued`, `eligibility.error`, `eligibility.verified`

        **Event Data Structure:**
        All webhook events follow the `WebhookEvent` schema with an `event` type and event-specific `data` payload.
        Connection events include `connectionId` and optional fields like `securityQuestion` or `selectedMfaContact`.
        Eligibility events include `eligibilityId` for tracking verification requests.

        **Webhook Payload Schema:**
        When events occur, your endpoint will receive HTTP POST requests with a JSON payload conforming to the `WebhookEvent` schema.

        **Webhook Security:**
        - Verify the signature using your endpoint's secret to ensure authenticity
        - Webhook payloads are sent as JSON with `Content-Type: application/json`

        **Delivery Guarantees:**
        - Webhooks are retried up to 3 times with exponential backoff
        - Endpoints must respond with HTTP 200-299 status codes to acknowledge receipt
        - Failed deliveries after retry attempts are logged for troubleshooting

        **Example Webhook Events:**
        - Connection Connected: See `WebhookEventConnected` example
        - Connection Invalid: See `WebhookEventInvalid` example  
        - Connection 2FA Required: See `WebhookEventConnection2FA` example
        - Connection Security Question: See `WebhookEventConnectionSQA` example
        - Connection Error: See `WebhookEventConnectionError` example
        - Connection Disconnected: See `WebhookEventDisconnected` example
        - Eligibility Queued: See `WebhookEventEligibilityQueued` example
        - Eligibility Error: See `WebhookEventEligibilityError` example
        - Eligibility Verified: See `WebhookEventEligibilityVerified` example
      operationId: webhooks-endpoints-create
      tags:
        - Endpoint
      requestBody:
        description: Contains the webhook endpoint request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndpointRequest"
            examples:
              Request:
                $ref: "#/components/examples/EndpointRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointResponse"
              examples:
                Response:
                  $ref: "#/components/examples/EndpointResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    put:
      summary: Update Webhook Endpoint
      description: |
        Updates existing webhook endpoint configuration.
      operationId: webhooks-endpoints-update
      tags:
        - Endpoint
      parameters:
        - in: query
          name: endpointId
          description: Unique identifier for endpoint
          required: true
          example: ep_2Y98DItWD2uZHF7K5bToy9OtskX
          schema:
            type: string
            minLength: 1
      requestBody:
        description: Contains the webhook endpoint request
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EndpointRequest"
            examples:
              Request:
                $ref: "#/components/examples/EndpointRequest"
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EndpointResponse"
              examples:
                Response:
                  $ref: "#/components/examples/EndpointResponse"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "403":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - API-Key: []
    delete:
      summary: Delete Webhook Endpoint
      description: |
        Deletes an existing webhook endpoint, stopping all future event notifications to that URL.
      operationId: webhooks-endpoints-remove
      tags:
        - Endpoint
      parameters:
        - in: query
          name: endpointId
          description: Unique identifier for endpoint
          required: true
          example: ep_2Y98DItWD2uZHF7K5bToy9OtskX
          schema:
            type: string
            minLength: 1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  transactionId:
                    type: string
                    description: Unique transaction identifier
                  response:
                    type: object
