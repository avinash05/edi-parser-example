    WebhookEventType:
      type: string
      description: |
        Webhook event types for different system events.

        **Connection Events:**
        - `connection.connected` - Connection successfully established
        - `connection.invalid` - Invalid credentials provided
        - `connection.2fa` - Multi-factor authentication required
        - `connection.sqa` - Security question authentication required
        - `connection.error` - Connection error occurred
        - `connection.disconnected` - Connection terminated

        **Eligibility Events:**
        - `eligibility.queued` - Eligibility request queued for processing
        - `eligibility.error` - Error during eligibility processing
        - `eligibility.verified` - Eligibility verification completed successfully
      enum:
        - "connection.connected"
        - "connection.invalid"
        - "connection.2fa"
        - "connection.sqa"
        - "connection.error"
        - "connection.disconnected"
        - "eligibility.queued"
        - "eligibility.error"
        - "eligibility.verified"
