        application/json:
          schema:
            $ref: "#/components/schemas/BadRequestError"
          examples:
            BadRequest:
              $ref: "#/components/examples/BadRequestError"
    UnauthorizedError:
      description: |
        **Unauthorized Access** - Authentication failed. This occurs when:
        - The `x-api-key` header is missing from the request
        - The provided API key is invalid or expired
        - The API key doesn't have permission for the requested resource

        Ensure you're using a valid API key in the `x-api-key` header.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
          examples:
            UnauthorizedError:
              $ref: "#/components/examples/UnauthorizedError"
