        **Bad Request** - The request was invalid or malformed. This typically occurs when:
        - Required fields are missing from the request body
        - Field values don't meet validation requirements (e.g., minimum length, format)
        - Invalid parameter values are provided
        - Request structure doesn't match the expected schema

        Check the error details for specific field validation failures.
